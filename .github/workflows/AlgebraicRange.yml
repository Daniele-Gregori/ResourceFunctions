name: Test AlgebraicRange

on:
  workflow_dispatch:
  push:
    paths:
      - 'Functions/AlgebraicRange/**'
  pull_request:
    paths:
      - 'Functions/AlgebraicRange/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Wolfram Engine image
        run: docker pull wolframresearch/wolframengine:14.2.0

      - name: Activate Wolfram Engine
        run: |
          docker run --rm \
            -e WOLFRAM_PRODUCT_KEY=${{ secrets.WOLFRAM_PRODUCT_KEY }} \
            -v "${{ github.workspace }}:/workspace" \
            wolframresearch/wolframengine:14.2.0 \
            wolframscript -code 'Print[$Version]'

      - name: Run AlgebraicRange tests
        run: |
          docker run --rm \
            -e WOLFRAM_PRODUCT_KEY=${{ secrets.WOLFRAM_PRODUCT_KEY }} \
            -v "${{ github.workspace }}:/workspace" \
            wolframresearch/wolframengine:14.2.0 \
            wolframscript -code '
              report = TestReport["/workspace/Functions/AlgebraicRange/Tests/AlgebraicRange-tests.wlt"];
              Print["Tests run:    ", report["TestsSucceededCount"] + report["TestsFailedCount"]];
              Print["Passed:       ", report["TestsSucceededCount"]];
              Print["Failed:       ", report["TestsFailedCount"]];
              If[report["TestsFailedCount"] > 0,
                Print["\nFailed tests:"];
                Scan[Print["  ", #TestID, " \[Rule] ", #Outcome] &,
                  Values @ Select[report["TestResults"], #Outcome =!= "Success" &]];
              ];
              Exit[If[report["AllTestsSucceeded"], 0, 1]]
            '
